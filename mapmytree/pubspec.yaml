name: mapmytree
description: MapMyTree - A tree mapping and eco-tracking mobile app UI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  supabase_flutter: ^2.9.0
  google_sign_in: ^7.2.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  uuid: ^4.4.0
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
