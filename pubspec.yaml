name: mapmytree
description: MapMyTree - A tree mapping and eco-tracking mobile app UI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  supabase_flutter: ^2.9.0
  google_sign_in: ^7.2.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  uuid: ^4.4.0
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  flutter_map_marker_cluster: ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
